<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Manage your Netflix Clone profile — update name, profile picture, and password." />
  <title>Profile — Netflix Clone</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

  <!-- ═══ NAVBAR ═══════════════════════════════════════════════════ -->
  <nav class="navbar scrolled" id="main-navbar">
    <div class="navbar-left">
      <a href="index.html" class="nav-logo">NETFLIX</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="browse.html">Browse</a></li>
        <li><a href="watchlist.html">My List</a></li>
      </ul>
    </div>
    <div class="navbar-right">
      <div class="nav-user">
        <img src="" alt="User" class="nav-avatar" id="nav-avatar" />
        <div class="nav-dropdown">
          <div class="dropdown-header">
            <div class="dropdown-name" id="nav-user-name">Loading...</div>
            <div class="dropdown-role" id="nav-user-role">user</div>
          </div>
          <a href="profile.html" class="dropdown-item">👤 Profile</a>
          <a href="admin.html" class="dropdown-item" id="admin-link" style="display:none;">🔐 Admin</a>
          <div style="border-top:1px solid var(--border-color);margin:4px 0;"></div>
          <div class="dropdown-item danger logout-btn">🚪 Sign Out</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ═══ PAGE CONTENT ══════════════════════════════════════════════ -->
  <main class="page-wrapper">

    <h1 class="page-title">👤 My Profile</h1>

    <div class="profile-grid">

      <!-- Profile Card -->
      <div>
        <div class="profile-card">
          <img src="" alt="Profile" class="profile-avatar" id="profile-avatar" />
          <h2 class="profile-name" id="profile-name">Loading...</h2>
          <p class="profile-email" id="profile-email">—</p>
          <p style="margin-bottom:8px;font-size:13px;color:var(--text-secondary);">
            <span id="profile-role">—</span>
          </p>
          <p style="font-size:12px;color:var(--text-muted);">
            Member since: <strong id="profile-since">—</strong>
          </p>
          <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border-color);">
            <a href="watchlist.html" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center;">📋 My Watchlist</a>
          </div>
        </div>
      </div>

      <!-- Forms -->
      <div style="display:flex;flex-direction:column;gap:24px;">

        <!-- Update Profile -->
        <div class="profile-form">
          <h3>✏️ Edit Profile</h3>
          <form id="profile-form">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="edit-name" class="form-input" placeholder="Your full name" />
            </div>
            <div class="form-group">
              <label class="form-label">Profile Picture URL</label>
              <input type="url" id="edit-profilePic" class="form-input" placeholder="https://..." />
            </div>
            <button type="submit" class="btn btn-primary" id="profile-save-btn">Save Changes</button>
          </form>
        </div>

        <!-- Change Password -->
        <div class="profile-form">
          <h3>🔒 Change Password</h3>
          <form id="password-form">
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <input type="password" id="current-password" class="form-input" placeholder="Enter current password" />
            </div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input type="password" id="new-password" class="form-input" placeholder="Enter new password (min. 6 chars)" />
            </div>
            <div class="form-group">
              <label class="form-label">Confirm New Password</label>
              <input type="password" id="confirm-password" class="form-input" placeholder="Confirm new password" />
            </div>
            <button type="submit" class="btn btn-primary" id="password-save-btn">Change Password</button>
          </form>
        </div>

      </div>
    </div>

  </main>

  <!-- ═══ FOOTER ═══════════════════════════════════════════════════ -->
  <footer class="footer">
    <p class="footer-text">Netflix Clone © 2026 | Built by Subhankar</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
